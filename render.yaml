services:
  - type: web
    name: learnify-mentor-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: learnify_tutor_db
      - key: CORS_ORIGINS
        sync: false
      - key: HOST
        value: 0.0.0.0
